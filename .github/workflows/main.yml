name: CI MLflow

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CSV_URL: "Project/wine-quality.csv"
  TARGET_VAR: "quality"
  ALPHA: 0.5
  L1_RATIO: 0.5
  RANDOM_STATE: 42

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #Check-out your repository under #GITHUB_WORKSPACE
      -uses: actions/checkout@v3

      #STEP Python 3.12.7
      - name: Set up Pyhton 3.12.7
        uses: actions/setup-pyhton@v4
        with:
          pyhton-version: "3.12.7"

      #Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL

      #Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      #Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run Project --env-manager=local
  
